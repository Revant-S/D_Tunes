<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 80%;
            margin: 0 auto;
            padding: 2vh 0;
        }
        .profile-header {
            display: flex;
            align-items: center;
            margin-bottom: 4vh;
        }
        .profile-photo {
            width: 20vw;
            height: 20vw;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 4vw;
        }
        .profile-info {
            flex-grow: 1;
        }
        .username {
            font-size: 4vh;
            color: #1DB954;
            margin-bottom: 1vh;
        }
        .user-role {
            font-size: 2.5vh;
            color: #B3B3B3;
            margin-bottom: 2vh;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4vh;
        }
        .stat-item {
            text-align: center;
            width: 30%;
        }
        .stat-value {
            font-size: 3vh;
            color: #1DB954;
        }
        .stat-label {
            font-size: 2vh;
            color: #B3B3B3;
        }
        .action-button {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 1.5vh 2vw;
            border-radius: 2vh;
            cursor: pointer;
            font-size: 2vh;
            transition: background-color 0.3s ease;
        }
        .action-button:hover {
            background-color: #1ED760;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-header">
            <img src="https://example.com/user-profile.jpg" alt="User Profile" class="profile-photo">
            <div class="profile-info">
                <h1 class="username">John Doe</h1>
                <p class="user-role">Artist</p>
                <button class="action-button">Add Friend</button>
            </div>
        </div>
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value">42</div>
                <div class="stat-label">Tracks</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">1.2K</div>
                <div class="stat-label">Followers</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">350</div>
                <div class="stat-label">Following</div>
            </div>
        </div>
        <!-- Add more sections as needed, e.g., recent tracks, etc. -->
    </div>
</body>
</html>
