<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile and Friends</title>
<style>
* {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}
body {
    position: relative;
    min-height: 100vh;
    width: 100vw;
    background-color: #121212;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    padding-bottom: 2vh;
}
.container {
    width: 90%;
    margin: 0 auto;
}
.upper-section {
    height: 40vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    margin-bottom: 5vh;
}
.main-details {
    display: flex;
    width: 100%;
    height: 90%;
    align-items: center;
}
.display-pic {
    height: 100%;
    width: 30%;
    display: flex;
    justify-content: center;
    align-items: center;
}
.display-pic img {
    height: 80%;
    aspect-ratio: 1/1;
    object-fit: cover;
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
}
.upper-section-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
}
.upper-section-info > div {
    margin-bottom: 2vh;
}
.userName h1 {
    font-size: 3.5vw;
    font-weight: 600;
    margin-bottom: 0.5vh;
}
.Role h3 {
    font-size: 1.8vw;
    font-weight: 400;
    color: #a0a0a0;
}
#sendFriendRequest {
    color: #121212;
    background-color: #e0e0e0;
    padding: 1vh 2vw;
    border: none;
    border-radius: 5px;
    transition: 0.3s;
    font-size: 1.2vw;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
}
#sendFriendRequest:hover {
    background-color: #ffffff;
    cursor: pointer;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
}

/* Friends List Styles */
.friends-section h2 {
    text-align: center;
    color: #e0e0e0;
    font-size: 2.5vh;
    margin-bottom: 3vh;
    font-weight: 600;
}
.friend-card {
    background-color: #1E1E1E;
    border-radius: 0.5vw;
    padding: 2vh 2vw;
    margin-bottom: 2vh;
    display: flex;
    align-items: center;
    transition: all 0.3s ease;
}
.friend-card:hover {
    transform: translateY(-0.5vh);
    box-shadow: 0 0.5vh 1.5vh rgba(255, 255, 255, 0.1);
}
.friend-photo {
    width: 8vw;
    height: 8vw;
    border-radius: 50%;
    object-fit: cover;
    margin-right: 2vw;
}
.friend-info {
    flex-grow: 1;
}
.friend-name {
    font-size: 2.2vh;
    margin-bottom: 1vh;
    color: #ffffff;
    font-weight: 500;
}
.friend-detail {
    margin-bottom: 0.5vh;
    color: #a0a0a0;
    font-size: 1.6vh;
}
.friend-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 1vh;
}
.action-button {
    background-color: #2c2c2c;
    color: #e0e0e0;
    border: none;
    padding: 1vh 1.5vw;
    border-radius: 0.3vw;
    cursor: pointer;
    margin-left: 1vw;
    transition: all 0.3s ease;
    font-size: 1.4vh;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.action-button:hover {
    background-color: #3c3c3c;
    transform: translateY(-2px);
}
</style>
</head>
<body>
<div class="container">
    <div class="upper-section">
        <div class="main-details">
            <div class="display-pic">
                <img src="/public/profileImages/defaultProfile.png" id="profile-image" alt="Profile Picture">
            </div>
            <div class="upper-section-info">
                <div class="userName">
                    <h1>Revant Sinha</h1>
                </div>
                <div class="Role">
                    <h3>Artist</h3>
                </div>
                <div class="friendRequestBtn">
                    <button id="sendFriendRequest">
                        Connect
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="friends-section">
        <h2>Friends</h2>
        <div class="friend-card">
            <img src="https://example.com/friend1.jpg" alt="Friend 1" class="friend-photo">
            <div class="friend-info">
                <div class="friend-name">John Doe</div>
                <div class="friend-detail">Email: john@example.com</div>
                <div class="friend-detail">Role: Normal User</div>
                <div class="friend-detail">Liked Songs: 42</div>
                <div class="friend-actions">
                    <button class="action-button">Message</button>
                    <button class="action-button">View Profile</button>
                </div>
            </div>
        </div>
        <div class="friend-card">
            <img src="https://example.com/friend2.jpg" alt="Friend 2" class="friend-photo">
            <div class="friend-info">
                <div class="friend-name">Jane Smith</div>
                <div class="friend-detail">Email: jane@example.com</div>
                <div class="friend-detail">Role: Artist</div>
                <div class="friend-detail">Published Tracks: 15</div>
                <div class="friend-actions">
                    <button class="action-button">Message</button>
                    <button class="action-button">View Profile</button>
                </div>
            </div>
        </div>
        <!-- Add more friend cards as needed -->
    </div>
</div>
</body>
</html>
