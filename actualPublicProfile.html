<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile</title>
<style>
* {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}
body {
    position: relative;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    background-color: #121212;
    color: #e0e0e0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
.upper-section {
    width: 90%;
    height: 40vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    margin: 5%;
}
.main-details {
    display: flex;
    width: 100%;
    height: 90%;
    align-items: center;
}
.display-pic {
    height: 100%;
    width: 30%;
    display: flex;
    justify-content: center;
    align-items: center;
}
.display-pic img {
    height: 80%;
    aspect-ratio: 1/1;
    object-fit: cover;
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
}
.upper-section-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 100%;
}
.upper-section-info > div {
    margin-bottom: 2vh;
}
.userName h1 {
    font-size: 3.5vw;
    font-weight: 600;
    margin-bottom: 0.5vh;
}
.Role h3 {
    font-size: 1.8vw;
    font-weight: 400;
    color: #a0a0a0;
}
#sendFriendRequest {
    color: #121212;
    background-color: #e0e0e0;
    padding: 1vh 2vw;
    border: none;
    border-radius: 5px;
    transition: 0.3s;
    font-size: 1.2vw;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.1em;
}
#sendFriendRequest:hover {
    background-color: #ffffff;
    cursor: pointer;
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(255, 255, 255, 0.1);
}
</style>
</head>
<body>
<div class="upper-section">
    <div class="main-details">
        <div class="display-pic">
            <img src="/public/profileImages/defaultProfile.png" id="profile-image" alt="Profile Picture">
        </div>
        <div class="upper-section-info">
            <div class="userName">
                <h1>Revant Sinha</h1>
            </div>
            <div class="Role">
                <h3>Artist</h3>
            </div>
            <div class="friendRequestBtn">
                <button id="sendFriendRequest">
                    Request
                </button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
